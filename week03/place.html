<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Country page showcasing Nigeria's data and weather.">
  <title>Country Page - Nigeria</title>

  <!-- CSS -->

  <link rel="stylesheet" href="styles/place.css">

  <!-- JavaScript -->

  <script src="scripts/place.js" defer></script>

</head>

<body>

<header>
  <h1>Nigeria</h1>
</header>

<main>

  <!-- HERO IMAGE -->

  <section class="hero">
    <picture>
      <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
      <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
      <img src="images/hero-small.webp"
           alt="Landscape view of Nigeria"
           width="1500"
           height="750">
    </picture>
  </section>

  <!-- DATA SECTION -->

  <section class="data">
    <h2>Data</h2>
    <ul>
      <li><strong>Capital:</strong> Abuja</li>
      <li><strong>Population:</strong> 200+ million</li>
      <li><strong>Language:</strong> English</li>
      <li><strong>Currency:</strong> Naira (₦)</li>
      <li><strong>Region:</strong> West Africa</li>
    </ul>
  </section>

  <!-- WEATHER SECTION -->

  <section class="weather">
    <h2>Weather</h2>

```
<!-- SVG ICON (MOBILE ONLY) -->
<img src="images/weather.svg" alt="Weather icon" class="weather-icon">

<p>Temperature: <span id="temp">30</span> °C</p>
<p>Wind Speed: <span id="speed">10</span> km/h</p>
<p>Wind Chill: <span id="windchill"></span></p>
```

  </section>

</main>

<footer>
  <p>&copy; <span id="year"></span> Nigeria</p>
  <p>Last Modified: <span id="modified"></span></p>
</footer>

</body>
</html>
